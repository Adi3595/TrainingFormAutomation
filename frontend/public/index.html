<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />

  <!-- SEO META -->
  <title>Training Form Automation System | HR Training Management</title>

  <meta name="description" content="Training Form Automation System for HR training management, employee feedback collection, and automated reporting." />
  <meta name="keywords" content="HR training system, training automation, employee feedback system, HR management tool" />
  <meta name="robots" content="index, follow" />

  <!-- Google Verification -->
  <meta name="google-site-verification" content="aGdPQRfSvXDtxb2djix8cqZAUV9P_Ln0IV6AcWZsoQI" />

  <!-- Theme -->
  <meta name="theme-color" content="#667eea" />

  <!-- Open Graph (Social Sharing) -->
  <meta property="og:title" content="Training Form Automation System" />
  <meta property="og:description" content="Automated HR training management system for feedback and reporting." />
  <meta property="og:type" content="website" />

  <!-- Icons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Structured Data (VERY IMPORTANT FOR SEO) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Training Form Automation System",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "description": "HR training management system for automated training, feedback collection, and reporting.",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "INR"
    }
  }
  </script>

  <!-- GLOBAL STYLES -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    html {
      scroll-behavior: smooth;
    }

    #root {
      min-height: 100vh;
    }

    /* Loading spinner */
    #root:empty::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      transform: translate(-50%, -50%);
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    /* Accessibility */
    :focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    ::selection {
      background: rgba(102,126,234,0.3);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(102,126,234,0.5);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(102,126,234,0.8);
    }
  </style>
</head>

<body>

  <!-- IMPORTANT FOR GOOGLE (SPA SEO FIX) -->
  <noscript>
    <h1>Training Form Automation System</h1>
    <p>
      HR Training Management Platform for automated employee training,
      feedback collection, and reporting.
    </p>
  </noscript>

  <div id="root"></div>

  <!-- ERROR HANDLING -->
  <script>
    window.addEventListener('error', function(e) {
      console.error('Error:', e.error);
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error('Promise Error:', e.reason);
    });
  </script>

</body>
</html>
